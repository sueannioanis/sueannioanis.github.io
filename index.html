<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineering Daily</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fa;
    color:#222;
}

.main{
    width:100%;
    padding:30px;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:38px;
    margin-bottom:10px;
}

.header p{
    color:#555;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
    gap:20px;
}

    /* This applies only to screens that are 768px wide or smaller */
@media (max-width: 768px) {
  .news-grid {
    display: flex;
    flex-wrap: wrap; /* Wraps items to the next line */
    /* OR change direction entirely to stack them: */
    /* flex-direction: column; */
  }
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h2{
    font-size:20px;
    margin-bottom:12px;
}

.card p{
    color:#555;
    line-height:1.6;
}

.card .meta{
    margin-top:15px;
    color:#888;
    font-size:13px;
}

.card a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.badge{
    display:inline-block;
    background:#dbeafe;
    color:#1e40af;
    padding:6px 10px;
    border-radius:20px;
    margin-bottom:10px;
    font-size:12px;
    font-weight:bold;
}

@media(max-width:900px){
    .news-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="main">

    <div class="header">
        <h1>Data Engineering Daily</h1>
        <p>
            Real-time aggregation of data engineering,
            Apache Spark, Kafka, Airflow, data warehouse,
            cloud analytics, lakehouse, and infrastructure news.
        </p>
    </div>

    <div class="news-grid" id="newsGrid"></div>

</div>

<script>

const feeds = [
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml",
    "https://feeds.feedburner.com/oreilly/radar",
    "https://www.reddit.com/r/dataengineering/.rss",
    "https://www.reddit.com/r/apachekafka/.rss",
    "https://www.reddit.com/r/bigdata/.rss"
];

async function loadNews() {

    const container = document.getElementById("newsGrid");

    container.innerHTML = `
        <div class="card">
            <h2>Loading latest data engineering news...</h2>
        </div>
    `;

    let allArticles = [];

    for (const feed of feeds) {

        try {

            const url =
                "https://api.rss2json.com/v1/api.json?rss_url=" +
                encodeURIComponent(feed);

            const response = await fetch(url);
            const data = await response.json();

            if (data.items) {

                data.items.forEach(item => {

                    allArticles.push({
                        title: item.title,
                        summary: item.description
                            .replace(/<[^>]+>/g, "")
                            .replace(/\s+/g, " ")
                            .substring(0, 250) + "...",
                        source: data.feed.title,
                        url: item.link,
                        date: item.pubDate
                    });

                });

            }

        } catch (error) {
            console.error(error);
        }

    }

    allArticles.sort(
        (a, b) => new Date(b.date) - new Date(a.date)
    );

    renderNews(allArticles.slice(0, 50));
}

function renderNews(news) {

    const container = document.getElementById("newsGrid");

    container.innerHTML = "";

    if(news.length === 0){
        container.innerHTML = `
            <div class="card">
                <h2>No news available</h2>
            </div>
        `;
        return;
    }

    news.forEach(item => {

        container.innerHTML += `
            <div class="card">

                <div class="badge">
                    DATA ENGINEERING
                </div>

                <h2>${item.title}</h2>

                <p>${item.summary}</p>

                <div class="meta">
                    ${item.source}
                </div>

                <a href="${item.url}" target="_blank">
                    Read Full Article →
                </a>

            </div>
        `;

    });
}

loadNews();

setInterval(loadNews, 300000);

</script>

</body>
</html>
