<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataEng Pulse | Instant Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <nav class="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-50 px-4 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white text-xl shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-chart-network animate-pulse"></i>
                </div>
                <div>
                    <span class="text-lg font-bold text-white tracking-tight">DataEng<span class="text-indigo-400">Pulse</span></span>
                    <span class="block text-[10px] text-slate-400 font-mono">Instant News Pipeline</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="feed-filter" class="bg-slate-800 border border-slate-700 text-xs text-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="all">All Channels</option>
                    <option value="reddit">Reddit /r/dataengineering</option>
                    <option value="hacker">HackerNews / Tech</option>
                </select>
                <button id="refresh-feed" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-lg text-xs transition font-medium flex items-center gap-1">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="lg:col-span-2 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h2 class="text-lg font-semibold text-white tracking-tight">
                    <i class="fa-solid fa-bolt text-amber-400 mr-2"></i>Live Stream Ingestion
                </h2>
                <span class="text-xs text-slate-500 font-mono" id="stream-counter">Loading pipelines...</span>
            </div>

            <div id="feed-loader" class="text-center py-20 bg-slate-800/40 border border-slate-800 rounded-xl">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500 mb-3"></i>
                <p class="text-slate-400 text-xs">Querying data infrastructure feeds...</p>
            </div>

            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2
