<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineering Daily</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    color:#111;
}

header{
    background:#0f172a;
    color:white;
    padding:30px;
}

header h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

header p{
    color:#cbd5e1;
}

.container{
    padding:25px;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card h2{
    font-size:1.2rem;
    margin-bottom:10px;
}

.card p{
    color:#555;
    line-height:1.5;
}

.meta{
    margin-top:12px;
    font-size:.9rem;
    color:#666;
}

.card a{
    display:inline-block;
    margin-top:15px;
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.badge{
    display:inline-block;
    background:#dbeafe;
    color:#1e40af;
    padding:5px 10px;
    border-radius:20px;
    font-size:.8rem;
    margin-bottom:12px;
}
</style>

</head>
<body>

<header>
    <h1>Data Engineering Daily</h1>
    <p>
        Live aggregation of Data Engineering, Apache Spark,
        Kafka, Airflow, Lakehouse, Cloud Data Platform,
        and Analytics news.
    </p>
</header>

<div class="container">
    <div class="news-grid" id="newsGrid">
        <div class="card">
            <h2>Loading latest articles...</h2>
        </div>
    </div>
</div>

<script>

const RSS_FEEDS = [
    "https://www.reddit.com/r/dataengineering/.rss",
    "https://www.reddit.com/r/apachekafka/.rss",
    "https://www.reddit.com/r/bigdata/.rss",
    "https://feeds.feedburner.com/oreilly/radar",
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"
];

async function loadNews(){

    const allArticles = [];

    for(const feed of RSS_FEEDS){

        try{

            const response = await fetch(
                "https://api.rss2json.com/v1/api.json?rss_url=" +
                encodeURIComponent(feed)
            );

            const data = await response.json();

            if(data.items){

                data.items.forEach(item=>{

                    allArticles.push({
                        title:item.title,
                        description:
                            item.description
                            .replace(/<[^>]*>/g,'')
                            .replace(/\s+/g,' ')
                            .substring(0,250),
                        source:data.feed.title,
                        link:item.link,
                        date:item.pubDate
                    });

                });

            }

        }catch(error){
            console.log(error);
        }

    }

    allArticles.sort(
        (a,b)=>new Date(b.date)-new Date(a.date)
    );

    renderNews(allArticles.slice(0,50));

}

function renderNews(news){

    const container =
        document.getElementById("newsGrid");

    container.innerHTML = "";

    news.forEach(article=>{

        container.innerHTML += `
            <div class="card">

                <div class="badge">
                    DATA ENGINEERING
                </div>

                <h2>${article.title}</h2>

                <p>
                    ${article.description}
                </p>

                <div class="meta">
                    ${article.source}
                </div>

                <a href="${article.link}"
                   target="_blank">
                    Read Full Article →
                </a>

            </div>
        `;

    });

}

loadNews();

setInterval(loadNews,300000);

</script>

</body>
</html>
