
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineering Daily</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    color:#111827;
}

header{
    background:#0f172a;
    color:white;
    padding:40px;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    color:#cbd5e1;
    font-size:1.1rem;
}

.container{
    max-width:1600px;
    margin:auto;
    padding:30px;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(500px,1fr));
    gap:24px;
}

.card{
    background:white;
    border-radius:24px;
    padding:28px;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
    overflow:hidden;
}

.badge{
    display:inline-block;
    padding:10px 20px;
    border-radius:999px;
    background:#dbeafe;
    color:#1e40af;
    font-size:.9rem;
    font-weight:700;
    margin-bottom:22px;
}

.title{
    font-size:2.2rem;
    line-height:1.15;
    margin-bottom:20px;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.description{
    color:#555;
    font-size:1rem;
    line-height:1.8;

    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:6;

    overflow:hidden;
    text-overflow:ellipsis;

    overflow-wrap:anywhere;
    word-break:break-word;
}

.meta{
    margin-top:24px;
    color:#666;
    font-size:1rem;
}

.article-link{
    display:inline-block;
    margin-top:24px;
    font-size:1.2rem;
    font-weight:bold;
    color:#2563eb;
    text-decoration:none;
}

.article-link:hover{
    text-decoration:underline;
}

.loading{
    text-align:center;
    padding:60px;
    font-size:1.3rem;
}

@media(max-width:900px){

    .news-grid{
        grid-template-columns:1fr;
    }

    .title{
        font-size:1.6rem;
    }

    header h1{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<header>
    <h1>Data Engineering Daily</h1>

    <p>
        Live aggregation of Data Engineering, Spark,
        Kafka, Airflow, Data Warehousing, Lakehouse,
        Analytics Engineering and Cloud Platform news.
    </p>
</header>

<div class="container">

    <div id="newsGrid" class="news-grid">

        <div class="loading">
            Loading latest data engineering news...
        </div>

    </div>

</div>

<script>

const RSS_FEEDS = [
    "https://www.reddit.com/r/dataengineering/.rss",
    "https://www.reddit.com/r/apachekafka/.rss",
    "https://www.reddit.com/r/bigdata/.rss",
    "https://feeds.feedburner.com/oreilly/radar",
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"
];

async function loadNews() {

    const articles = [];

    for (const feed of RSS_FEEDS) {

        try {

            const response = await fetch(
                "https://api.rss2json.com/v1/api.json?rss_url=" +
                encodeURIComponent(feed)
            );

            const data = await response.json();

            if (data.items) {

                data.items.forEach(item => {

                    const cleanDescription =
                        (item.description || "")
                        .replace(/<[^>]*>/g, "")
                        .replace(/https?:\/\/[^\s]+/g, "")
                        .replace(/www\.[^\s]+/g, "")
                        .replace(/\s+/g, " ")
                        .trim();

                    articles.push({
                        title: item.title || "Untitled",
                        description: cleanDescription,
                        source: data.feed.title || "Unknown Source",
                        link: item.link,
                        date: item.pubDate
                    });

                });

            }

        } catch (error) {

            console.error(
                "Feed failed:",
                feed,
                error
            );

        }

    }

    articles.sort(
        (a,b) =>
            new Date(b.date) -
            new Date(a.date)
    );

    renderNews(
        articles.slice(0,50)
    );

}

function renderNews(news) {

    const container =
        document.getElementById("newsGrid");

    if (!news.length) {

        container.innerHTML = `
            <div class="loading">
                No articles available.
            </div>
        `;

        return;
    }

    container.innerHTML = news.map(article => `
        <article class="card">

            <div class="badge">
                DATA ENGINEERING
            </div>

            <h2 class="title">
                ${escapeHtml(article.title)}
            </h2>

            <p class="description">
                ${escapeHtml(article.description)}
            </p>

            <div class="meta">
                ${escapeHtml(article.source)}
            </div>

            <a
                class="article-link"
                href="${article.link}"
                target="_blank"
                rel="noopener noreferrer"
            >
                Read Full Article →
            </a>

        </article>
    `).join("");

}

function escapeHtml(text) {

    const div =
        document.createElement("div");

    div.textContent = text;

    return div.innerHTML;

}

loadNews();

setInterval(
    loadNews,
    300000
);

</script>

</body>
</html>
