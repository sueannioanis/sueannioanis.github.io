<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineering Daily</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    overflow-y:scroll;
}

body{
    background:#f4f7fa;
    color:#222;
}

.main{
    width:100%;
    max-width:1400px;
    margin:0 auto;
    padding:30px;
    overflow-x:hidden;
}

.header{
    margin-bottom:25px;
}

.header h1{
    font-size:38px;
    margin-bottom:10px;
}

.header p{
    color:#555;
    line-height:1.6;
}

.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
    gap:20px;
    align-items:start;
    min-height:1200px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    min-height:260px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:transform .2s;
    contain:layout;
}

.card:hover{
    transform:translateY(-4px);
}

.card h2{
    font-size:20px;
    margin-bottom:12px;
    line-height:1.4;
}

.card p{
    color:#555;
    line-height:1.6;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.card .meta{
    margin-top:15px;
    color:#888;
    font-size:13px;
}

.card a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
    overflow-wrap:anywhere;
}

.badge{
    display:inline-block;
    background:#dbeafe;
    color:#1e40af;
    padding:6px 10px;
    border-radius:20px;
    margin-bottom:10px;
    font-size:12px;
    font-weight:bold;
}

/* Skeleton Loading */

.skeleton{
    background:white;
    border-radius:12px;
    padding:20px;
    min-height:260px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.skeleton-line{
    height:16px;
    border-radius:8px;
    margin-bottom:12px;
    background:linear-gradient(
        90deg,
        #e5e7eb 25%,
        #f3f4f6 50%,
        #e5e7eb 75%
    );
    background-size:200% 100%;
    animation:loading 1.5s infinite;
}

.skeleton-line.large{
    height:28px;
}

.skeleton-line.short{
    width:60%;
}

@keyframes loading{
    0%{
        background-position:200% 0;
    }
    100%{
        background-position:-200% 0;
    }
}

@media (max-width:768px){

    .main{
        padding:15px;
    }

    .header h1{
        font-size:28px;
    }

    .news-grid{
        grid-template-columns:1fr;
        min-height:auto;
    }

    .card{
        min-height:auto;
    }
}
</style>
</head>
<body>

<div class="main">

    <div class="header">
        <h1>Data Engineering Daily</h1>

        <p>
            Real-time aggregation of data engineering,
            Apache Spark, Kafka, Airflow, data warehouse,
            cloud analytics, lakehouse, and infrastructure news.
        </p>
    </div>

    <div class="news-grid" id="newsGrid"></div>

</div>

<script>

const feeds = [
    "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml",
    "https://feeds.feedburner.com/oreilly/radar",
    "https://www.reddit.com/r/dataengineering/.rss",
    "https://www.reddit.com/r/apachekafka/.rss",
    "https://www.reddit.com/r/bigdata/.rss"
];

function showSkeletons() {

    const container = document.getElementById("newsGrid");

    container.innerHTML = Array(12)
        .fill(`
        <div class="skeleton">
            <div class="skeleton-line large"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
        </div>
    `)
        .join("");
}

async function loadNews() {

    const container = document.getElementById("newsGrid");

    showSkeletons();

    let allArticles = [];

    for (const feed of feeds) {

        try {

            const url =
                "https://api.rss2json.com/v1/api.json?rss_url=" +
                encodeURIComponent(feed);

            const response = await fetch(url);

            if (!response.ok) {
                continue;
            }

            const data = await response.json();

            if (data.items) {

                data.items.forEach(item => {

                    const cleanDescription =
                        (item.description || "")
                        .replace(/<[^>]+>/g, "")
                        .replace(/\s+/g, " ")
                        .trim();

                    allArticles.push({
                        title: item.title || "Untitled",
                        summary:
                            cleanDescription.substring(0,250) +
                            (cleanDescription.length > 250 ? "..." : ""),
                        source: data.feed?.title || "Unknown Source",
                        url: item.link || "#",
                        date: item.pubDate || ""
                    });

                });
            }

        } catch(error) {
            console.error(error);
        }
    }

    allArticles.sort(
        (a,b) => new Date(b.date) - new Date(a.date)
    );

    renderNews(allArticles.slice(0,50));
}

function renderNews(news){

    const container = document.getElementById("newsGrid");

    if(news.length === 0){

        container.innerHTML = `
            <div class="card">
                <h2>No news available</h2>
                <p>Please try again later.</p>
            </div>
        `;

        return;
    }

    const html = news.map(item => `
        <div class="card">

            <div class="badge">
                DATA ENGINEERING
            </div>

            <h2>${item.title}</h2>

            <p>${item.summary}</p>

            <div class="meta">
                ${item.source}
            </div>

            <a
                href="${item.url}"
                target="_blank"
                rel="noopener noreferrer"
            >
                Read Full Article →
            </a>

        </div>
    `).join("");

    container.innerHTML = html;
}

loadNews();

setInterval(loadNews, 300000);

</script>

</body>
</html>
